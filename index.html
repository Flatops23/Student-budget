<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <title>Budget Tracker</title>
    <style>
        :root {
            --m-black: #0d0d0d;
            --m-gray: #1a1a1a;
            --m-pink: #0026fd; 
            --m-glow: rgba(0, 7, 84, 0.652);
        }

        body { 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            padding: 20px; 
            background: var(--m-black);
            color: #eee;
            margin: 0;
        }
        
        .c { 
            background: var(--m-gray); 
            padding: 25px; 
            border-radius: 2px; 
            max-width: 400px; 
            margin: 20px auto; 
            border: 1px solid #333;
            border-left: 4px solid var(--m-pink); 
            box-shadow: 10px 10px 0px #000;
            position: relative;
            overflow: hidden;
        }

        .c::after {
            content: "";
            position: absolute;
            top: 0; right: 0;
            border-width: 0 20px 20px 0;
            border-style: solid;
            border-color: var(--m-pink) var(--m-black);
        }

        h3 { 
            text-align: left; 
            font-size: 1.2rem; 
            margin-top: 0;
            color: var(--m-pink);
            text-transform: uppercase;
            letter-spacing: 3px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .amt-display {
            font-family: 'Courier New', monospace;
            font-size: 2rem;
            margin-bottom: 20px;
            color: #fff;
            text-shadow: 0 0 10px var(--m-glow);
        }

        .input-group { margin-bottom: 15px; }

        input { 
            width: 100%; 
            box-sizing: border-box;
            margin-bottom: 10px; 
            padding: 12px; 
            background: #000; 
            border: 1px solid #444; 
            color: var(--m-pink); 
            border-radius: 0;
            outline: none;
            transition: 0.3s;
        }

        input:focus { border-color: var(--m-pink); box-shadow: 0 0 8px var(--m-glow); }

        .btn-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        button { 
            padding: 12px; 
            background: var(--m-pink); 
            color: #000; 
            border: none; 
            cursor: pointer; 
            font-weight: 900;
            text-transform: uppercase;
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0% 100%); 
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        button:hover { 
            background: #fff;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px var(--m-glow);
        }

        .clr { 
            background: transparent; 
            color: #666; 
            border: 1px solid #444; 
            clip-path: none;
            font-size: 0.7rem;
        }

        .clr:hover { color: #ff4444; border-color: #ff4444; background: rgba(255, 68, 68, 0.1); }

        ul { list-style: none; padding: 0; margin-top: 25px; }

        li { 
            padding: 12px; 
            background: rgba(255, 255, 255, 0.03);
            border-bottom: 1px solid #333; 
            display: flex; 
            justify-content: space-between; 
            margin-bottom: 5px;
            font-size: 0.9rem;
        }

        .r { 
            color: var(--m-pink); 
            cursor: pointer; 
            transition: 0.2s;
        }
        
        .r:hover { transform: scale(1.2); color: #fff; }

        .w-ui {
            background: #111;
            padding: 15px;
            margin-bottom: 15px;
            border: 1px solid var(--m-pink);
        }
        .rep-c {
            margin-top: 20px;
            padding: 10px;
            background: #000;
            border: 1px dashed #444;
            font-size: 0.8rem;
        }

        @media (max-width: 400px) {
            .btn-grid { grid-template-columns: 1fr; }
            .c { margin: 10px; }
        }
    </style>
</head>
<body>

<div class="c">
    <h3><i class="fas fa-microchip"></i> Budget Tracker</h3>
    
    <div class="w-ui">
        <small style="color:var(--m-pink)">WALLET</small>
        <div style="font-size: 1.5rem;">P<span id="wb">0.00</span></div>
        <button onclick="_dw()" style="clip-path:none; height:25px; font-size:0.6rem; margin-top:5px;">DEPOSIT</button>
    </div>

    <div class="amt-display">P<span id="t">0</span></div>
    
    <div class="input-group">
        <input type="text" id="k" placeholder="ITEM">
        <input type="number" id="v" placeholder="AMOUNT">
    </div>

    <div class="btn-grid">
        <button onclick="a()">
            <i class="fas fa-plus-square"></i> ADD
        </button>
        <button class="clr" onclick="c()">
            <i class="fas fa-trash-alt"></i> DELETE ALL
        </button>
    </div>

    <ul id="l"></ul>

    <div class="rep-c">
        <div id="rd">-</div>
        <div id="ad" style="color:#00ffcc; margin-top:5px"></div>
    </div>
</div>

<script>
    const SB_URL = "https://eivuevgqryzjohanddgw.supabase.co"; 
    const SB_KEY = "sb_publishable_9GHp4AFvFqMVBpc7ljraFg_WXEt15SM"; 
    const sb = supabase.createClient(SB_URL, SB_KEY);

    const m = document.getElementById('t');
    const u = document.getElementById('l');
    const ik = document.getElementById('k');
    const iv = document.getElementById('v');
    const _wb = document.getElementById('wb');
    const _rd = document.getElementById('rd');
    const _ad = document.getElementById('ad');

    let _w = parseFloat(localStorage.getItem('_w_val')) || 0;

    async function s() {
        let { data, error } = await sb.from('budget_db').select('*');
        
        if (error) {
            data = JSON.parse(localStorage.getItem('_b_bkp')) || [];
        } else {
            localStorage.setItem('_b_bkp', JSON.stringify(data));
        }

        u.innerHTML = "";
        let _z = 0;
        data.forEach(row => {
            _z += row.amount;
            let r = document.createElement('li');
            r.innerHTML = `
                <span><i class="fas fa-caret-right" style="color:var(--m-pink)"></i> ${row.item}</span> 
                <span>P${row.amount.toFixed(2)} <i class="fas fa-times-circle r" onclick="x(${row.id})"></i></span>
            `;
            u.appendChild(r);
        });
        m.innerText = _z.toFixed(2);
        _wb.innerText = _w.toFixed(2);
        _gr(data, _z);
    }

    function _dw() {
        let _v = prompt("Amount:");
        if(_v && !isNaN(_v)) {
            _w += parseFloat(_v);
            localStorage.setItem('_w_val', _w);
            s();
        }
    }

    function _gr(_d, _t) {
        if(_d.length === 0) return;
        let _av = _t / _d.length;
        _rd.innerHTML = `Count: ${_d.length} | Avg: P${_av.toFixed(2)}`;
        let _p = _t * 1.12;
        if(_t > _w && _w > 0) {
            _ad.innerText = "Limit exceeded. Save 20%.";
        } else if (_t > 500) {
            _ad.innerText = `Forecast: P${_p.toFixed(0)}. Watch trends.`;
        } else {
            _ad.innerText = "Status: Optimal.";
        }
    }

    async function a() {
        let n = ik.value;
        let p = parseFloat(iv.value);
        if (n && p > 0) {
            await sb.from('budget_db').insert([{ item: n, amount: p }]);
            s(); 
            ik.value = '';
            iv.value = '';
        }
    }

    async function x(id) {
        await sb.from('budget_db').delete().eq('id', id);
        s();
    }

    async function c() {
        if(confirm("Sure ka?!! ")) {
            await sb.from('budget_db').delete().neq('id', 0);
            s();
        }
    }

    s();

    if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("/service-worker.js")
        .then(() => console.log("up"));
    }
</script>

</body>
</html>
