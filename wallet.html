<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <title>Vault</title>
    <style>
        :root { --m-black: #0d0d0d; --m-gray: #1a1a1a; --m-pink: #0026fd; --m-green: #00ff88; }
        body { font-family: 'Segoe UI', sans-serif; padding: 20px; background: var(--m-black); color: #eee; margin: 0; }
        .c { background: var(--m-gray); padding: 25px; border-radius: 2px; max-width: 400px; margin: 20px auto; border: 1px solid #333; border-left: 4px solid var(--m-green); box-shadow: 10px 10px 0px #000; position: relative; }
        h3 { color: var(--m-green); text-transform: uppercase; letter-spacing: 3px; display: flex; align-items: center; gap: 10px; margin-top: 0; }
        .amt-display { font-family: 'Courier New', monospace; font-size: 2.5rem; margin-bottom: 20px; color: var(--m-green); }
        input { width: 100%; box-sizing: border-box; margin-bottom: 10px; padding: 12px; background: #000; border: 1px solid #444; color: var(--m-green); outline: none; }
        button { width: 100%; padding: 12px; background: var(--m-green); color: #000; border: none; cursor: pointer; font-weight: 900; text-transform: uppercase; clip-path: polygon(5% 0, 100% 0, 95% 100%, 0% 100%); }
        .nav-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: #111; display: flex; justify-content: space-around; padding: 12px 0; border-top: 2px solid var(--m-pink); }
        .nav-item { color: #555; text-decoration: none; text-align: center; font-size: 0.7rem; font-weight: bold; flex: 1; }
        .nav-item.active { color: var(--m-pink); }
        .nav-item i { display: block; font-size: 1.3rem; margin-bottom: 4px; }
    </style>
</head>
<body>

<div class="c">
    <h3><i class="fas fa-vault"></i> Vault</h3>
    <div class="amt-display">P<span id="w-val">0</span></div>
    <input type="number" id="w-input" placeholder="Amount">
    <button onclick="saveW()">Store to Wallet</button>
</div>

<nav class="nav-bar">
    <a href="index.html" class="nav-item"><i class="fas fa-home"></i>MAIN</a>
    <a href="wallet.html" class="nav-item active"><i class="fas fa-vault"></i>WALLET</a>
    <a href="reports.html" class="nav-item"><i class="fas fa-brain"></i>INSIGHTS</a>
</nav>

<script>
    function saveW() {
        let val = parseFloat(document.getElementById('w-input').value) || 0;
        let current = parseFloat(localStorage.getItem("e_wallet")) || 0;
        localStorage.setItem("e_wallet", current + val);
        location.reload();
    }
    window.onload = () => {
        document.getElementById('w-val').innerText = localStorage.getItem("e_wallet") || 0;
    }
</script>
</body>
</html>
